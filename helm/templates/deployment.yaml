apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName | default "demo-app" }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName | default "demo-app" }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName | default "demo-app" }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
